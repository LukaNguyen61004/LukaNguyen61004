<svg xmlns="http://www.w3.org/2000/svg" width="854" height="220" viewBox="0 0 854 220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0812"/>
      <stop offset="50%" stop-color="#0d0b1a"/>
      <stop offset="100%" stop-color="#12081f"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="854" height="220" fill="url(#bgGrad)"/>
  <rect width="854" height="220" fill="url(#grid)"/>

  <rect x="0" y="-8" width="854" height="2" fill="#a78bfa" opacity="0.15">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,230" dur="6s" repeatCount="indefinite"/>
  </rect>

  <rect x="12" y="12" width="830" height="196" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-dasharray="12 6" opacity="0.85" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;36" dur="2.2s" repeatCount="indefinite"/>
  </rect>
  <rect x="20" y="20" width="814" height="180" fill="none" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.55">
    <animate attributeName="stroke-dashoffset" values="36;0" dur="2.6s" repeatCount="indefinite"/>
  </rect>

  <circle cx="80" cy="55" r="3" fill="#a78bfa" opacity="0.45">
    <animate attributeName="cy" values="55;70;55" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="760" cy="160" r="4" fill="#ec4899" opacity="0.4">
    <animate attributeName="cy" values="160;145;160" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="50" r="2.5" fill="#06b6d4" opacity="0.5">
    <animate attributeName="cx" values="700;720;700" dur="6s" repeatCount="indefinite"/>
  </circle>

  <text x="427" y="95" text-anchor="middle" font-family="'Courier New', Consolas, monospace" font-size="36" font-weight="700" fill="url(#titleGrad)" filter="url(#glow)">
    &lt;LukaNguyen61004/&gt;<tspan fill="#a78bfa">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>_
    </tspan>
  </text>

  <text x="427" y="140" text-anchor="middle" font-family="'Courier New', Consolas, monospace" font-size="18" font-weight="700" fill="#06b6d4" opacity="0.95">
    &gt; Software Engineer Intern 
  </text>
</svg>
